# Sekans TEST — host nginx vhost (/etc/nginx/sites-available/sekans.conf)
# Once HTTP olarak kurulur; sertifika alindiktan sonra setup.sh 443 blogunu ekler.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name sekans.65-21-234-84.sslip.io 65.21.234.84 _;

    # Let's Encrypt dogrulamasi
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    root /opt/sekans/webroot;
    index index.html;
    client_max_body_size 64m;

    # API -> php konteyneri
    location /api/ {
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # Statik medya uzun cache
    location ~* \.(js|css|woff2?|png|jpe?g|svg|webp|gif|pdf)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA geri donusu
    location / {
        try_files $uri $uri/ /index.html;
    }
}
